<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text font-family="sans-serif" font-size="15" font-weight="500" x="340" y="28" text-anchor="middle" fill="#1a1a1a">System Architecture</text>

<!-- PARENT -->
<rect x="220" y="48" width="240" height="52" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="70" text-anchor="middle" fill="#3C3489">Factory controller</text>
<text font-family="sans-serif" font-size="12" x="340" y="88" text-anchor="middle" fill="#534AB7">main.c — fork · exec · waitpid</text>

<!-- fork arrows -->
<line x1="270" y1="100" x2="130" y2="152" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="310" y1="100" x2="265" y2="152" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="370" y1="100" x2="415" y2="152" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="410" y1="100" x2="550" y2="152" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- MACHINE 1 -->
<rect x="40" y="152" width="172" height="130" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="126" y="175" text-anchor="middle" fill="#085041">Machine 1</text>
<text font-family="sans-serif" font-size="12" x="126" y="192" text-anchor="middle" fill="#0F6E56">machine.c</text>
<rect x="56" y="204" width="140" height="24" rx="5" fill="none" stroke="#0F6E56" stroke-width="0.5" opacity="0.6"/>
<text font-family="sans-serif" font-size="12" x="126" y="218" text-anchor="middle" fill="#0F6E56">Thread: production</text>
<rect x="56" y="232" width="140" height="24" rx="5" fill="none" stroke="#0F6E56" stroke-width="0.5" opacity="0.6"/>
<text font-family="sans-serif" font-size="12" x="126" y="246" text-anchor="middle" fill="#0F6E56">Thread: temperature</text>
<rect x="56" y="260" width="140" height="24" rx="5" fill="none" stroke="#0F6E56" stroke-width="0.5" opacity="0.6"/>
<text font-family="sans-serif" font-size="12" x="126" y="274" text-anchor="middle" fill="#0F6E56">Thread: vibration</text>

<!-- MACHINE 2 -->
<rect x="228" y="152" width="172" height="130" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="314" y="175" text-anchor="middle" fill="#085041">Machine 2</text>
<text font-family="sans-serif" font-size="12" x="314" y="192" text-anchor="middle" fill="#0F6E56">machine.c</text>
<rect x="244" y="204" width="140" height="24" rx="5" fill="none" stroke="#0F6E56" stroke-width="0.5" opacity="0.6"/>
<text font-family="sans-serif" font-size="12" x="314" y="218" text-anchor="middle" fill="#0F6E56">Thread: production</text>
<rect x="244" y="232" width="140" height="24" rx="5" fill="none" stroke="#0F6E56" stroke-width="0.5" opacity="0.6"/>
<text font-family="sans-serif" font-size="12" x="314" y="246" text-anchor="middle" fill="#0F6E56">Thread: temperature</text>
<rect x="244" y="260" width="140" height="24" rx="5" fill="none" stroke="#0F6E56" stroke-width="0.5" opacity="0.6"/>
<text font-family="sans-serif" font-size="12" x="314" y="274" text-anchor="middle" fill="#0F6E56">Thread: vibration</text>

<!-- MONITOR -->
<rect x="415" y="152" width="130" height="130" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="480" y="175" text-anchor="middle" fill="#712B13">Monitor</text>
<text font-family="sans-serif" font-size="12" x="480" y="192" text-anchor="middle" fill="#993C1D">monitor.c</text>
<rect x="428" y="204" width="104" height="24" rx="5" fill="none" stroke="#993C1D" stroke-width="0.5" opacity="0.6"/>
<text font-family="sans-serif" font-size="12" x="480" y="218" text-anchor="middle" fill="#993C1D">Receive data</text>
<rect x="428" y="232" width="104" height="24" rx="5" fill="none" stroke="#993C1D" stroke-width="0.5" opacity="0.6"/>
<text font-family="sans-serif" font-size="12" x="480" y="246" text-anchor="middle" fill="#993C1D">Detect anomalies</text>
<rect x="428" y="260" width="104" height="24" rx="5" fill="none" stroke="#993C1D" stroke-width="0.5" opacity="0.6"/>
<text font-family="sans-serif" font-size="12" x="480" y="274" text-anchor="middle" fill="#993C1D">Write shared mem</text>

<!-- LOGGER -->
<rect x="556" y="152" width="112" height="130" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="612" y="175" text-anchor="middle" fill="#633806">Logger</text>
<text font-family="sans-serif" font-size="12" x="612" y="192" text-anchor="middle" fill="#854F0B">logger.c</text>
<rect x="568" y="204" width="88" height="24" rx="5" fill="none" stroke="#854F0B" stroke-width="0.5" opacity="0.6"/>
<text font-family="sans-serif" font-size="12" x="612" y="218" text-anchor="middle" fill="#854F0B">Read shared mem</text>
<rect x="568" y="232" width="88" height="24" rx="5" fill="none" stroke="#854F0B" stroke-width="0.5" opacity="0.6"/>
<text font-family="sans-serif" font-size="12" x="612" y="246" text-anchor="middle" fill="#854F0B">Write log file</text>
<rect x="568" y="260" width="88" height="24" rx="5" fill="none" stroke="#854F0B" stroke-width="0.5" opacity="0.6"/>
<text font-family="sans-serif" font-size="12" x="612" y="274" text-anchor="middle" fill="#854F0B">open·write·lseek</text>

<!-- MESSAGE QUEUE -->
<rect x="100" y="340" width="192" height="52" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="196" y="360" text-anchor="middle" fill="#0C447C">Message queue</text>
<text font-family="sans-serif" font-size="12" x="196" y="378" text-anchor="middle" fill="#185FA5">System V IPC · msgget/msgsnd</text>

<!-- machines → MQ -->
<line x1="126" y1="282" x2="165" y2="340" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>
<line x1="314" y1="282" x2="225" y2="340" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>

<!-- MQ → monitor -->
<path d="M292 366 L400 280 L465 282" fill="none" stroke="#D85A30" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="5 3"/>

<!-- SHARED MEMORY -->
<rect x="336" y="340" width="200" height="52" rx="10" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="436" y="360" text-anchor="middle" fill="#72243E">Shared memory</text>
<text font-family="sans-serif" font-size="12" x="436" y="378" text-anchor="middle" fill="#993556">shmget · shmat + semaphore</text>

<!-- monitor → SHM -->
<line x1="480" y1="282" x2="460" y2="340" stroke="#D4537E" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>

<!-- SHM → logger -->
<line x1="536" y1="366" x2="578" y2="340" stroke="#D4537E" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)" fill="none"/>

<!-- LOG FILE -->
<rect x="220" y="452" width="240" height="52" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="472" text-anchor="middle" fill="#444441">logs/machine.log</text>
<text font-family="sans-serif" font-size="12" x="340" y="490" text-anchor="middle" fill="#5F5E5A">timestamp · machine · temp · status</text>

<!-- logger → log file -->
<line x1="612" y1="282" x2="440" y2="452" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>

<!-- SIGNALS -->
<rect x="10" y="452" width="174" height="52" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="97" y="472" text-anchor="middle" fill="#791F1F">Signals</text>
<text font-family="sans-serif" font-size="12" x="97" y="490" text-anchor="middle" fill="#A32D2D">SIGINT shutdown · SIGUSR1 status</text>

<!-- LEGEND -->
<line x1="12" y1="544" x2="42" y2="544" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>
<text font-family="sans-serif" font-size="12" x="48" y="548" fill="#444441">Data send</text>
<line x1="110" y1="544" x2="140" y2="544" stroke="#D85A30" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)" fill="none"/>
<text font-family="sans-serif" font-size="12" x="146" y="548" fill="#444441">Data receive</text>
<line x1="236" y1="544" x2="266" y2="544" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>
<text font-family="sans-serif" font-size="12" x="272" y="548" fill="#444441">fork / spawn</text>
</svg>

